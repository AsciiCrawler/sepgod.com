<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recall Station | Active Recall Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --accent-neon: #00ff9d;
            --accent-cyan: #00f2ff;
            --card-bg: #141414;
        }

        body {
            background-color: var(--bg-deep);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .max-reading-width {
            max-width: 75ch; /* Optimización para legibilidad  */
            margin-left: auto;
            margin-right: auto;
        }

        /* Estética Neon-Terminal */
        .neon-border {
            border: 1px solid rgba(0, 255, 157, 0.2);
            transition: all 0.3s ease;
        }
        .neon-border:hover {
            border-color: var(--accent-neon);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1);
        }

        /* Animaciones */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Flashcard Flip */
        .flip-card {
            background-color: transparent;
            perspective: 1000px;
            height: 300px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-neon); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="border-b border-white/10 p-4 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="zap" class="text-green-400"></i>
                <h1 class="mono text-xl font-bold tracking-tighter">RECALL<span class="text-green-400">_STATION</span></h1>
            </div>
            <div class="flex gap-6 mono text-sm font-medium">
                <button onclick="switchTab('flashcards')" class="hover:text-green-400 transition-colors">FLASHCARDS</button>
                <button onclick="switchTab('blurting')" class="hover:text-green-400 transition-colors">BLURTING</button>
                <button onclick="switchTab('quiz')" class="hover:text-green-400 transition-colors">QUIZ</button>
            </div>
        </div>
    </nav>

    <main class="flex-1 p-6">
        <div id="app-container" class="max-w-4xl mx-auto">
            </div>
    </main>

    <footer class="border-t border-white/10 p-4 bg-black/30">
        <div class="max-w-6xl mx-auto flex justify-between items-center mono text-xs text-white/40">
            <div id="status-bar">MODO: EXPLORACIÓN</div>
            <div id="progress-bar">PROGRESO: 0%</div>
        </div>
    </footer>

    <script>
        // 1. Estructura de Datos (Basada en Unidad 1.pdf)
        const appData = {
            metadata: { title: "Presentación de datos en tablas y gráficas" },
            topics: [
                {
                    id: 1,
                    title: "Definiciones de Estadística",
                    summary: "Ciencia que utiliza conjuntos de datos numéricos para obtener inferencias basadas en el cálculo de probabilidades[cite: 1396, 1404]. Incluye recolección, organización e interpretación.",
                    flashcards: [
                        { q: "¿Qué estudia la estadística descriptiva?", a: "Proporciona métodos para recoger, organizar, resumir y analizar datos para conclusiones válidas[cite: 1419, 1827]." },
                        { q: "¿Cuál es la raíz latina de la palabra estadística?", a: "Viene del latín 'status', que significa ciencia del Estado[cite: 1394]." }
                    ]
                },
                {
                    id: 2,
                    title: "Variables y Escalas",
                    summary: "Las variables se clasifican en Cualitativas (no numéricas) y Cuantitativas (Discretas/enteros o Continuas/fraccionarios)[cite: 1446, 1454, 1829]. Las escalas son: Nominal, Ordinal, Intervalo y Razón[cite: 1460].",
                    flashcards: [
                        { q: "¿Qué es una variable cuantitativa discreta?", a: "Aquella que solo puede tomar valores enteros, obtenida por conteo (ej. número de alumnos)[cite: 1457, 1458]." },
                        { q: "¿Cuál es la característica de la escala nominal?", a: "Agrupa observaciones en categorías sin orden de preferencia[cite: 1462, 1464]." }
                    ]
                },
                {
                    id: 3,
                    title: "Distribución de Frecuencias",
                    summary: "Organiza datos en tablas. El rango es la diferencia entre el dato mayor y el menor[cite: 1546]. El número de clases se determina usualmente con la raíz cuadrada de N[cite: 1547].",
                    flashcards: [
                        { q: "¿Cómo se define la frecuencia absoluta?", a: "La cantidad de veces que un número o característica aparece en el conjunto de datos[cite: 1530]." },
                        { q: "¿Qué representa la frecuencia relativa?", a: "La proporción de una clase respecto al total de datos (frecuencia / total)[cite: 1601]." }
                    ]
                }
            ],
            quiz: [
                { q: "¿Cuál es el primer paso para crear una distribución por intervalos?", options: ["Calcular el rango", "Determinar número de clases", "Encontrar el mayor y menor de los datos"], correct: 2 },
                { q: "Si una variable toma valores como temperatura (con decimales), es:", options: ["Cuantitativa discreta", "Cuantitativa continua", "Cualitativa nominal"], correct: 1 },
                { q: "En un polígono de porcentajes acumulados, ¿cuál es el punto más alto?", options: ["El total de datos (n)", "El 100%", "La marca de clase"], correct: 1 }
            ]
        };

        // 2. Lógica de Estado
        let state = {
            activeTab: 'flashcards',
            currentTopicIndex: 0,
            flashcardIndex: 0,
            quizStep: 0,
            score: 0,
            progress: JSON.parse(localStorage.getItem('recallProgress')) || { flashcardsSeen: 0, quizHighscore: 0 }
        };

        function saveState() {
            localStorage.setItem('recallProgress', JSON.stringify(state.progress));
        }

        // 3. Renderizado de Componentes
        function render() {
            const container = document.getElementById('app-container');
            container.innerHTML = '';
            lucide.createIcons();

            if (state.activeTab === 'flashcards') renderFlashcards(container);
            if (state.activeTab === 'blurting') renderBlurting(container);
            if (state.activeTab === 'quiz') renderQuiz(container);

            updateStats();
            lucide.createIcons();
        }

        function switchTab(tab) {
            state.activeTab = tab;
            render();
        }

        // --- MÓDULO FLASHCARDS ---
        function renderFlashcards(container) {
            const topic = appData.topics[state.currentTopicIndex];
            const card = topic.flashcards[state.flashcardIndex];
            
            container.innerHTML = `
                <div class="fade-in max-reading-width space-y-8">
                    <div class="flex justify-between items-center">
                        <h2 class="mono text-green-400 text-sm tracking-widest uppercase">Flashcards: ${topic.title}</h2>
                        <span class="text-xs text-white/40">${state.flashcardIndex + 1} / ${topic.flashcards.length}</span>
                    </div>

                    <div class="flip-card cursor-pointer" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="flip-card-front bg-[#111] neon-border">
                                <p class="text-xl font-medium px-4">${card.q}</p>
                                <p class="absolute bottom-4 text-[10px] mono text-white/20 uppercase">Click para revelar</p>
                            </div>
                            <div class="flip-card-back bg-green-950/20 neon-border border-green-500/50">
                                <p class="text-lg leading-relaxed text-green-100">${card.a}</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-center gap-4 pt-4">
                        <button onclick="prevCard()" class="p-3 neon-border hover:bg-white/5 rounded-full"><i data-lucide="arrow-left"></i></button>
                        <button onclick="nextCard()" class="p-3 neon-border hover:bg-white/5 rounded-full"><i data-lucide="arrow-right"></i></button>
                    </div>
                </div>
            `;
        }

        function nextCard() {
            const topic = appData.topics[state.currentTopicIndex];
            if (state.flashcardIndex < topic.flashcards.length - 1) {
                state.flashcardIndex++;
            } else if (state.currentTopicIndex < appData.topics.length - 1) {
                state.currentTopicIndex++;
                state.flashcardIndex = 0;
            }
            render();
        }

        function prevCard() {
            if (state.flashcardIndex > 0) {
                state.flashcardIndex--;
            } else if (state.currentTopicIndex > 0) {
                state.currentTopicIndex--;
                state.flashcardIndex = appData.topics[state.currentTopicIndex].flashcards.length - 1;
            }
            render();
        }

        // --- MÓDULO BLURTING ---
        function renderBlurting(container) {
            const topic = appData.topics[state.currentTopicIndex];
            container.innerHTML = `
                <div class="fade-in max-reading-width space-y-6">
                    <div class="header space-y-2">
                        <h2 class="mono text-cyan-400 text-sm tracking-widest uppercase">Modo Blurting: ${topic.title}</h2>
                        <p class="text-sm text-white/50">Escribe todo lo que recuerdas sobre este tema. Sin presión.</p>
                    </div>
                    
                    <textarea id="blurting-input" 
                        class="w-full h-64 bg-black/50 neon-border rounded-xl p-6 mono text-sm focus:outline-none focus:border-cyan-500 placeholder:text-white/10"
                        placeholder="Escribe aquí..."></textarea>
                    
                    <div id="blurting-comparison" class="hidden space-y-4">
                        <div class="p-6 bg-white/5 rounded-xl border border-white/10">
                            <h3 class="mono text-xs text-white/40 mb-3 uppercase tracking-tighter">Resumen del PDF</h3>
                            <p class="text-sm leading-relaxed">${topic.summary}</p>
                        </div>
                    </div>

                    <button onclick="compareBlurting()" 
                        class="w-full py-4 bg-cyan-500/10 border border-cyan-500/50 hover:bg-cyan-500/20 text-cyan-400 mono text-sm font-bold tracking-widest rounded-xl transition-all">
                        FINALIZAR Y COMPARAR
                    </button>
                </div>
            `;
        }

        function compareBlurting() {
            document.getElementById('blurting-comparison').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // --- MÓDULO QUIZ ---
        function renderQuiz(container) {
            if (state.quizStep >= appData.quiz.length) {
                renderQuizResult(container);
                return;
            }

            const q = appData.quiz[state.quizStep];
            container.innerHTML = `
                <div class="fade-in max-reading-width space-y-8">
                    <div class="flex justify-between items-center">
                        <h2 class="mono text-yellow-500 text-sm tracking-widest uppercase">Auto-evaluación</h2>
                        <span class="text-xs mono">${state.quizStep + 1} / ${appData.quiz.length}</span>
                    </div>

                    <div class="p-8 bg-[#111] neon-border rounded-2xl">
                        <p class="text-xl mb-8">${q.q}</p>
                        <div class="grid gap-4">
                            ${q.options.map((opt, idx) => `
                                <button onclick="checkQuiz(${idx})" 
                                    class="text-left p-4 rounded-xl border border-white/10 hover:border-yellow-500/50 hover:bg-white/5 transition-all text-sm mono">
                                    ${idx + 1}. ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function checkQuiz(idx) {
            if (idx === appData.quiz[state.quizStep].correct) {
                state.score++;
            }
            state.quizStep++;
            render();
        }

        function renderQuizResult(container) {
            state.progress.quizHighscore = Math.max(state.progress.quizHighscore, state.score);
            saveState();
            
            container.innerHTML = `
                <div class="fade-in text-center py-12 space-y-6">
                    <i data-lucide="award" class="mx-auto text-yellow-500 w-16 h-16"></i>
                    <h2 class="text-3xl font-bold mono">RESULTADO: ${state.score} / ${appData.quiz.length}</h2>
                    <p class="text-white/50">Tu progreso ha sido guardado localmente.</p>
                    <button onclick="resetQuiz()" class="px-8 py-3 bg-yellow-600 rounded-full mono text-sm font-bold">REINTENTAR</button>
                </div>
            `;
        }

        function resetQuiz() {
            state.quizStep = 0;
            state.score = 0;
            render();
        }

        // --- SISTEMA ---
        function updateStats() {
            document.getElementById('status-bar').innerText = `MODO: ${state.activeTab.toUpperCase()}`;
            const totalTasks = appData.topics.length + appData.quiz.length;
            const completed = state.currentTopicIndex + (state.quizStep > 0 ? 1 : 0);
            const percent = Math.round((completed / totalTasks) * 100);
            document.getElementById('progress-bar').innerText = `PROGRESO: ${percent}%`;
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
