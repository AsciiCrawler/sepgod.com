<!DOCTYPE html>
<html lang="es">
<head>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Juego Épico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="app">
        <section id="screen-menu" class="screen active">
            <h1>TÍTULO DEL JUEGO</h1>
            <div class="menu-options">
                <button id="btn-new">Nuevo</button>
                <button id="btn-load">Cargar</button>
                <button id="btn-credits">Créditos</button>
            </div>
        </section>

        <section id="screen-game" class="screen hidden">
            <h2>Nivel <span id="ui-level">1</span></h2>
            <p>Aquí va el contenido de tu juego...</p>
            <button id="btn-save" style="margin-top: 2rem;">Guardar Partida</button>
            <button id="btn-back-menu">Volver al Menú</button>
        </section>

        <section id="screen-credits" class="screen hidden">
            <h2>Créditos</h2>
            <p>Desarrollado por un Dev Crack.</p>
            <button id="btn-back-from-credits">Volver</button>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
