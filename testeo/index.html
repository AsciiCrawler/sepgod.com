<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extractor OCR PRO</title>
  <style>
    /* Reset básico y estilos limpios */
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      padding: 40px 20px; 
      max-width: 800px; 
      margin: 0 auto; 
      color: #333;
    }
    .card {
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border: 1px solid #eaeaea;
    }
    .btn { 
      background: #000; 
      color: white; 
      border: none; 
      padding: 10px 20px; 
      font-weight: bold;
      cursor: pointer; 
      border-radius: 6px; 
      transition: background 0.2s;
    }
    .btn:hover { background: #333; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    #output { 
      background: #f8f9fa; 
      padding: 20px; 
      border-radius: 6px; 
      white-space: pre-wrap; 
      min-height: 200px; 
      margin-top: 20px; 
      border: 1px solid #e2e8f0; 
      font-family: monospace;
      font-size: 14px;
    }
    .loader { 
      display: none; 
      color: #0066cc; 
      font-weight: 500; 
      margin-top: 15px; 
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>🤖 Extractor de Texto (OCR) para PDFs</h2>
    <p>Sube tu PDF escaneado (Máx 5MB) para extraer el texto.</p>

    <div style="margin: 20px 0;">
      <input type="file" id="file-input" accept=".pdf, .png, .jpg" />
      <button id="extract-btn" class="btn">Procesar Documento</button>
    </div>
    
    <div id="loading" class="loader">Enviando al servidor OCR... Esto puede tardar unos segundos, paciencia.</div>
    <div id="output">El texto extraído aparecerá aquí...</div>
  </div>

  <script>
    // === CONFIGURACIÓN CRÍTICA ===
    // 1. Ve a https://ocr.space/OCRAPI y pide una API Key gratuita (te llega al correo al instante).
    // 2. Pégala aquí abajo. (He dejado 'helloworld' que es de prueba, pero falla si hay mucha gente usándola).
    const API_KEY = 'helloworld'; 

    const btn = document.getElementById('extract-btn');
    const fileInput = document.getElementById('file-input');
    const output = document.getElementById('output');
    const loading = document.getElementById('loading');

    btn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      
      // Validaciones de trinchera
      if (!file) {
        alert('¡Sube un archivo primero!');
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        alert('Cuidado: Para la API gratuita, el archivo debe pesar menos de 5MB.');
        return;
      }

      // Preparar UI
      btn.disabled = true;
      loading.style.display = 'block';
      output.innerText = '';

      // Montar el FormData (es como enviar un form HTML tradicional pero por JS)
      const formData = new FormData();
      formData.append('file', file);
      formData.append('language', 'spa'); // 'spa' para español. Cámbialo a 'eng' si el texto está en inglés.
      formData.append('isOverlayRequired', 'false');

      try {
        // Llamada a la API
        const response = await fetch('https://api.ocr.space/parse/image', {
          method: 'POST',
          headers: {
            'apikey': API_KEY,
          },
          body: formData
        });

        const data = await response.json();

        // Control de errores de la API
        if (data.IsErroredOnProcessing) {
          throw new Error(data.ErrorMessage[0]);
        }

        // Parsear el resultado (puede venir en varias páginas)
        let extractedText = '';
        if (data.ParsedResults && data.ParsedResults.length > 0) {
          data.ParsedResults.forEach((result, index) => {
            extractedText += `--- PÁGINA ${index + 1} ---\n`;
            extractedText += result.ParsedText + '\n\n';
          });
        } else {
          extractedText = 'No se encontró texto reconocible en el documento.';
        }

        // Pintar en pantalla
        output.innerText = extractedText;

      } catch (error) {
        console.error('Error en el proceso:', error);
        output.innerText = `Error crítico: ${error.message}\n\n¿Estás usando la API key 'helloworld'? Intenta conseguir tu propia key gratuita.`;
      } finally {
        // Restaurar estado
        btn.disabled = false;
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
