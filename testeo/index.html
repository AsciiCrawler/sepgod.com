<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rushing Waving</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="app">
        <section id="screen-menu" class="screen active">
            <h1>Rushing Waving</h1>
            <div class="menu-options">
                <button id="btn-new">Nuevo Juego</button>
                <button id="btn-load">Cargar Partida</button>
                <button id="btn-credits">Créditos</button>
            </div>
        </section>

        <section id="screen-game" class="screen hidden">
            <h2>Nivel <span id="ui-level">1</span></h2>
            
            <div id="game-board">
                <div class="vapor-sun"></div>
                <div id="player">😎</div>
                <div id="ground"></div>
            </div>

            <div class="game-buttons">
                <button id="btn-save">💾 Guardar</button>
                <button id="btn-back-menu">Volver</button>
            </div>
        </section>

        <section id="screen-credits" class="screen hidden">
            <h2>Créditos</h2>
            <p>Desarrollado por el mejor.</p>
            <button id="btn-back-from-credits">Volver</button>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
