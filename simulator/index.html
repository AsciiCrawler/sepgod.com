<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Financiera - Interés Compuesto v4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff007f;
            --neon-cyan: #00f3ff;
            --neon-yellow: #ffea00;
            --bg-color: #050505;
            --grid-color: rgba(0, 243, 255, 0.08);
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            margin: 0;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            align-items: flex-start;
            max-width: 1000px;
            width: 100%;
        }

        .terminal-container, .table-container {
            background: rgba(10, 10, 12, 0.95);
            padding: 30px;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink), inset 0 0 10px var(--neon-pink);
            border-radius: 4px;
        }

        .terminal-container {
            width: 380px;
            text-align: center;
            flex-shrink: 0;
        }

        .table-container {
            flex-grow: 1;
            min-width: 300px;
            max-width: 500px;
            max-height: 650px;
            overflow-y: auto;
            display: none;
        }

        .table-container::-webkit-scrollbar {
            width: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: var(--bg-color);
            border-left: 1px solid var(--neon-pink);
        }
        .table-container::-webkit-scrollbar-thumb {
            background: var(--neon-pink);
        }

        h1, h2 {
            font-size: 1.4em;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green), 0 0 10px var(--neon-green);
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: var(--neon-cyan);
            text-shadow: 0 0 2px var(--neon-cyan);
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: black;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            box-shadow: 0 0 10px var(--neon-cyan);
            border-color: #fff;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: transparent;
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--neon-pink);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            transition: all 0.2s ease-in-out;
        }

        button:hover {
            background: var(--neon-pink);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--neon-pink);
            text-shadow: none;
        }

        #result {
            margin-top: 25px;
            font-size: 1em;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            min-height: 2em;
            word-wrap: break-word;
            text-align: left;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border: 1px dashed var(--neon-cyan);
        }

        .sys-msg {
            font-size: 0.7em;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 20px;
            text-align: right;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        th, td {
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 10px;
            text-align: right;
        }

        th {
            background: black;
            color: var(--neon-pink);
            text-shadow: 0 0 3px var(--neon-pink);
            position: sticky;
            top: 0;
            text-align: center;
        }

        td {
            color: #fff;
        }

        td:first-child {
            text-align: center;
            color: var(--neon-green);
            font-weight: bold;
        }

        .highlight {
            color: var(--neon-cyan);
        }

        /* Para que el layout principal permita elementos abajo */
body { flex-direction: column; }

/* Contenedor nuevo para el gráfico */
.chart-container {
    background: rgba(10, 10, 12, 0.95);
    padding: 20px;
    border: 2px solid var(--neon-cyan);
    box-shadow: 0 0 15px var(--neon-cyan), inset 0 0 10px var(--neon-cyan);
    border-radius: 4px;
    width: 100%;
    max-width: 910px;
    margin-top: 30px;
    display: none;
    box-sizing: border-box;
}
        
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="terminal-container">
            <h1>SYS.CALC // v4.0</h1>

            <div class="input-group">
                <label for="principal">Capital Inicial (P)</label>
                <input type="number" id="principal" placeholder="Ej. 5000" required>
            </div>

            <div class="input-group">
                <label for="pmt">Aportación Anual (Ahorro)</label>
                <input type="number" id="pmt" placeholder="Ej. 1200" value="0">
            </div>
            <div class="input-group">
                <label for="step-up">Aumento Anual al Ahorro (%)</label>
                <input type="number" id="step-up" placeholder="Ej. 4" value="0">
            </div>

            <div class="input-group">
                <label for="rate">Tasa de Interés Anual (%)</label>
                <input type="number" id="rate" placeholder="Ej. 10" step="0.01" required>
            </div>

            <div class="input-group">
                <label for="frequency">Capitalización (n)</label>
                <select id="frequency">
                    <option value="12">Mensual (12 veces/año)</option>
                    <option value="4">Trimestral (4 veces/año)</option>
                    <option value="2">Semestral (2 veces/año)</option>
                    <option value="1">Anual (1 vez/año)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="time">Tiempo en Años (t)</label>
                <input type="number" id="time" placeholder="Ej. 5" required>
            </div>

            <button onclick="executeCalculation()">EJECUTAR SECUENCIA</button>

            <div id="result">Esperando parámetros...</div>

            <div class="sys-msg">STATUS: ONLINE | INFLACIÓN: 4%</div>
        </div>

        <div class="table-container" id="table-container">
            <h2>PROYECCIÓN DE DATOS</h2>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>AÑO</th>
                        <th>INVERTIDO</th>
                        <th>INTERÉS</th>
                        <th>NOMINAL</th>
                        <th style="color: var(--neon-yellow); text-shadow: 0 0 3px var(--neon-yellow);">REAL (-4%)</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="chart-container" id="chart-container">
    <h2>GRÁFICO DE CRECIMIENTO</h2>
    <canvas id="growthChart"></canvas>
</div>

    <script>
    let myChart = null;
    
   function executeCalculation() {
        const P = parseFloat(document.getElementById('principal').value);
        let PMT = parseFloat(document.getElementById('pmt').value) || 0; 
        const stepUpRate = (parseFloat(document.getElementById('step-up').value) || 0) / 100;
        const r_percent = parseFloat(document.getElementById('rate').value);
        const n = parseFloat(document.getElementById('frequency').value);
        const t = parseFloat(document.getElementById('time').value);

        // Validación más robusta (evita negativos en campos clave)
        if (isNaN(P) || isNaN(r_percent) || isNaN(n) || isNaN(t) || t <= 0 || P < 0) {
            document.getElementById('result').innerHTML = "<span style='color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); text-align: center; display: block;'>ERROR: PARÁMETROS INVÁLIDOS O INCOMPLETOS.</span>";
            return;
        }

        const r = r_percent / 100;
        const inflationRate = 0.04; 
        
        let currentBalance = P;
        let totalInvested = P;
        
        // Arreglos para el gráfico inicializados
        let chartLabels = [0];
        let chartDataInvested = [P];
        let chartDataNominal = [P];
        let chartDataReal = [P];

        // Usamos una variable temporal para el HTML (Mejor rendimiento)
        let rowsHTML = '';

        for (let year = 1; year <= t; year++) {
            let balanceAfterCompounding = currentBalance * Math.pow(1 + (r / n), n);
            currentBalance = balanceAfterCompounding + PMT;
            totalInvested += PMT;
            let accumulatedInterest = currentBalance - totalInvested;
            let realPurchasingPower = currentBalance / Math.pow(1 + inflationRate, year);

            rowsHTML += `<tr>
                <td>[ ${year} ]</td>
                <td>$${totalInvested.toFixed(2)}</td>
                <td class="highlight">$${accumulatedInterest.toFixed(2)}</td>
                <td>$${currentBalance.toFixed(2)}</td>
                <td style="color: var(--neon-yellow);">$${realPurchasingPower.toFixed(2)}</td>
            </tr>`;

            // Convertimos a Number para evitar bugs en Chart.js
            chartLabels.push(year);
            chartDataInvested.push(Number(totalInvested.toFixed(2)));
            chartDataNominal.push(Number(currentBalance.toFixed(2)));
            chartDataReal.push(Number(realPurchasingPower.toFixed(2)));

            PMT = PMT * (1 + stepUpRate);
        }

        // Una sola inyección al DOM (Rendimiento PRO)
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = rowsHTML; 

        document.getElementById('table-container').style.display = 'block';
        document.getElementById('chart-container').style.display = 'block';

        const finalInterest = currentBalance - totalInvested;
        const finalRealBalance = currentBalance / Math.pow(1 + inflationRate, t);

        document.getElementById('result').innerHTML = 
            `<span style="color: #fff; font-size: 0.9em;">> BALANCE NOMINAL FINAL:</span><br>` +
            `<span style="font-size: 1.4em; color: #fff; display: block; margin-bottom: 10px;">$${currentBalance.toFixed(2)}</span>` +
            `<span style="font-size: 0.85em; color: var(--neon-cyan);">> TOTAL INVERTIDO: $${totalInvested.toFixed(2)}</span><br>` +
            `<span style="font-size: 0.85em; color: var(--neon-pink);">> GANANCIA PURA: $${finalInterest.toFixed(2)}</span><br><br>` +
            `<span style="color: var(--neon-yellow); font-size: 0.9em; text-shadow: 0 0 5px var(--neon-yellow);">> PODER ADQUISITIVO REAL:</span><br>` +
            `<span style="font-size: 1.4em; color: var(--neon-yellow); text-shadow: 0 0 5px var(--neon-yellow); display: block;">$${finalRealBalance.toFixed(2)}</span>` +
            `<span style="font-size: 0.7em; color: rgba(255,255,255,0.6);">(Descontando 4% inflación anual)</span>`;

        renderChart(chartLabels, chartDataInvested, chartDataNominal, chartDataReal);
    }

    function renderChart(labels, dataInvested, dataNominal, dataReal) {
        const ctx = document.getElementById('growthChart').getContext('2d');
        if (myChart !== null) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Total Invertido', data: dataInvested, borderColor: '#ff007f', backgroundColor: 'rgba(255, 0, 127, 0.1)', borderWidth: 2, fill: true, tension: 0.3 },
                    { label: 'Balance Nominal', data: dataNominal, borderColor: '#00f3ff', backgroundColor: 'rgba(0, 243, 255, 0.1)', borderWidth: 2, fill: true, tension: 0.3 },
                    { label: 'Real (-4% Inflación)', data: dataReal, borderColor: '#ffea00', backgroundColor: 'rgba(255, 234, 0, 0.1)', borderWidth: 2, fill: true, tension: 0.3 }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#00f3ff', font: { family: "'Courier New', Courier, monospace" } } } },
                scales: {
                    x: { grid: { color: 'rgba(0, 243, 255, 0.1)' }, ticks: { color: '#39ff14', font: { family: "'Courier New', Courier, monospace" } }, title: { display: true, text: 'AÑOS', color: '#ff007f', font: { family: "'Courier New', Courier, monospace" } } },
                    y: { grid: { color: 'rgba(0, 243, 255, 0.1)' }, ticks: { color: '#39ff14', font: { family: "'Courier New', Courier, monospace" }, callback: function(value) { return '$' + value; } } }
                }
            }
        });
    }
</script>

</body>
</html>
