<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Financiera - Interés Compuesto</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff007f;
            --neon-cyan: #00f3ff;
            --bg-color: #050505;
            --grid-color: rgba(0, 243, 255, 0.08);
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .terminal-container {
            background: rgba(10, 10, 12, 0.95);
            padding: 30px;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink), inset 0 0 10px var(--neon-pink);
            border-radius: 4px;
            width: 380px;
            text-align: center;
        }

        h1 {
            font-size: 1.4em;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green), 0 0 10px var(--neon-green);
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: var(--neon-cyan);
            text-shadow: 0 0 2px var(--neon-cyan);
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: black;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            box-shadow: 0 0 10px var(--neon-cyan);
            border-color: #fff;
        }

        /* Ocultar las flechas en inputs de tipo number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: transparent;
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--neon-pink);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            transition: all 0.2s ease-in-out;
        }

        button:hover {
            background: var(--neon-pink);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--neon-pink);
            text-shadow: none;
        }

        #result {
            margin-top: 25px;
            font-size: 1.1em;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            min-height: 2em;
            word-wrap: break-word;
        }

        .sys-msg {
            font-size: 0.7em;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 20px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <h1>SYS.CALC // INTERÉS_COMPUESTO</h1>

        <div class="input-group">
            <label for="principal">Capital Inicial (P)</label>
            <input type="number" id="principal" placeholder="Ej. 5000" required>
        </div>

        <div class="input-group">
            <label for="rate">Tasa de Interés Anual (r) en %</label>
            <input type="number" id="rate" placeholder="Ej. 10" step="0.01" required>
        </div>

        <div class="input-group">
            <label for="frequency">Capitalización (n)</label>
            <select id="frequency">
                <option value="12">Mensual (12 veces/año)</option>
                <option value="4">Trimestral (4 veces/año)</option>
                <option value="2">Semestral (2 veces/año)</option>
                <option value="1">Anual (1 vez/año)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="time">Tiempo en Años (t)</label>
            <input type="number" id="time" placeholder="Ej. 5" required>
        </div>

        <button onclick="executeCalculation()">EJECUTAR SECUENCIA</button>

        <div id="result">Esperando parámetros...</div>

        <div class="sys-msg">v1.0 - ONLINE</div>
    </div>

    <script>
        function executeCalculation() {
            // Extraer valores de los inputs
            const P = parseFloat(document.getElementById('principal').value);
            const r_percent = parseFloat(document.getElementById('rate').value);
            const n = parseFloat(document.getElementById('frequency').value);
            const t = parseFloat(document.getElementById('time').value);

            // Validación básica para asegurar que se ingresaron números
            if (isNaN(P) || isNaN(r_percent) || isNaN(n) || isNaN(t)) {
                document.getElementById('result').innerHTML = "<span style='color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink);'>ERROR: PARÁMETROS INVÁLIDOS.</span>";
                return;
            }

            // Convertir la tasa porcentual a decimal (ej. 10% -> 0.10)
            const r = r_percent / 100;

            // Aplicar la fórmula: A = P * (1 + r/n)^(n*t)
            const base = 1 + (r / n);
            const exponent = n * t;
            const A = P * Math.pow(base, exponent);
            
            // Calcular el interés neto generado
            const interestEarned = A - P;

            // Mostrar el resultado formateado a 2 decimales
            document.getElementById('result').innerHTML = 
                `> MONTO TOTAL (A): <br><span style="font-size: 1.4em; color: #fff;">$${A.toFixed(2)}</span><br><br>` +
                `<span style="font-size: 0.8em; color: var(--neon-cyan);">> INTERÉS GENERADO: $${interestEarned.toFixed(2)}</span>`;
        }
    </script>

</body>
</html>
